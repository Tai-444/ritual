                        <body>
                            <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Todo</title>
    
    <!-- PWA Manifest Link -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">

    <style>
        /* === COLORS === */
        :root {
            --bg-color: #000000;
            --accent-color: #FF00FF;
            --text-color: #FFFFFF;
            --text-muted: #888888;
            --transition: all 0.3s ease;
        }

        /* === BASE STYLES === */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #app-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 40px 20px;
            text-align: center;
        }

        /* === LOGO === */
        .logo {
            height: 100px;
            width: auto;
            margin-bottom: 30px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        /* === INPUT SECTION === */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: 2px solid var(--accent-color);
            border-radius: 4px;
            padding: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: var(--transition);
        }

        input[type="text"]:focus {
            box-shadow: 0 0 10px var(--accent-color);
        }

        .add-btn {
            background: var(--accent-color);
            color: black;
            border: none;
            padding: 0 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: var(--transition);
        }

        .add-btn:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }

        /* === FILTER TABS === */
        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: var(--transition);
        }

        .filter-btn.active {
            background: var(--accent-color);
            color: black;
        }

        /* === TODO LIST === */
        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 0, 255, 0.05);
            border-left: 3px solid var(--accent-color);
            padding: 12px;
            margin-bottom: 10px;
            transition: var(--transition);
            animation: slideIn 0.3s ease-out;
        }

        .todo-item:hover {
            background: rgba(255, 0, 255, 0.15);
        }

        .todo-item.completed .text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .todo-content {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            flex: 1;
            text-align: left;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            transition: var(--transition);
        }

        .delete-btn:hover {
            color: var(--accent-color);
        }

        .empty-state {
            color: var(--text-muted);
            font-style: italic;
            margin-top: 20px;
        }

        /* === PARTICLES === */
        #particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: var(--accent-color);
            border-radius: 50%;
            opacity: 0;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            20% {
                opacity: 0.7;
            }
            80% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-10vh) translateX(20px);
                opacity: 0;
            }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div id="particle-container"></div>

    <div id="app-container">
        <img src="logo.png" alt="Logo" class="logo">

        <div class="input-group">
            <input type="text" id="todo-input" placeholder="Add a new ritual..." autocomplete="off">
            <button class="add-btn" id="add-btn">ADD</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul class="todo-list" id="todo-list"></ul>
        <div id="empty-msg" class="empty-state">The void is empty...</div>
    </div>

    <script>
        /* === STATE MANAGEMENT === */
        let todos = JSON.parse(localStorage.getItem('rituals')) || [];
        let currentFilter = 'all';

        const input = document.getElementById('todo-input');
        const addBtn = document.getElementById('add-btn');
        const list = document.getElementById('todo-list');
        const emptyMsg = document.getElementById('empty-msg');
        const filterBtns = document.querySelectorAll('.filter-btn');

        /* === CORE FUNCTIONS === */
        function save() {
            localStorage.setItem('rituals', JSON.stringify(todos));
            render();
        }

        function addTask() {
            const text = input.value.trim();
            if (text) {
                todos.push({ id: Date.now(), text, completed: false });
                input.value = '';
                save();
            }
        }

        function toggleTask(id) {
            todos = todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
            save();
        }

        function deleteTask(id) {
            todos = todos.filter(t => t.id !== id);
            save();
        }

        function render() {
            list.innerHTML = '';
            
            const filtered = todos.filter(t => {
                if (currentFilter === 'active') return !t.completed;
                if (currentFilter === 'completed') return t.completed;
                return true;
            });

            if (filtered.length === 0) {
                emptyMsg.style.display = 'block';
            } else {
                emptyMsg.style.display = 'none';
                filtered.forEach(todo => {
                    const li = document.createElement('li');
                    li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                    li.innerHTML = `
                        <div class="todo-content" onclick="toggleTask(${todo.id})">
                            <span class="text">${todo.text}</span>
                        </div>
                        <button class="delete-btn" onclick="deleteTask(${todo.id})">&times;</button>
                    `;
                    list.appendChild(li);
                });
            }
        }

        /* === EVENT LISTENERS === */
        addBtn.addEventListener('click', addTask);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') addTask(); });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                render();
            });
        });

        // Expose functions to global window for the onclick handlers
        window.toggleTask = toggleTask;
        window.deleteTask = deleteTask;

        /* === PARTICLE SYSTEM === */
        function createParticles() {
            const container = document.getElementById('particle-container');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                
                // Randomize starting position and timing
                const left = Math.random() * 100;
                const delay = Math.random() * 10;
                const duration = 5 + Math.random() * 10;
                
                p.style.left = `${left}%`;
                p.style.animationDelay = `${delay}s`;
                p.style.animationDuration = `${duration}s`;
                
                container.appendChild(p);
            }
        }

        /* === PWA SERVICE WORKER REGISTRATION === */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW registration failed', err));
            });
        }

        // Initialize
        createParticles();
        render();
    </script>
</body>
</html>

							<script>
                            	const cacheName = 'ritual-v1';
const assets = ['./', './index.html', './logo.png'];

self.addEventListener('install', e => {
  e.waitUntil(caches.open(cacheName).then(cache => cache.addAll(assets)));
});

self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
});
							</script>
                        </body>
                        </html>
